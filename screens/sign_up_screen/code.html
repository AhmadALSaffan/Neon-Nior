<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | NEON NOIR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-secondary-fixed-variant": "#5e00e6",
              "secondary-container": "#6817f4",
              "on-tertiary": "#005762",
              "tertiary-dim": "#00d4ec",
              "primary-dim": "#e31754",
              "on-primary": "#63001e",
              "on-primary-container": "#4d0016",
              "surface-container": "#19191d",
              "primary": "#ff8b9b",
              "on-secondary-container": "#f4ecff",

              "surface-container-lowest": "#000000",
              "surface": "#0e0e11",
              "on-secondary": "#270069",
              "surface-container-high": "#1f1f23",
              "surface-container-low": "#131316",
              "surface-bright": "#2c2c30",
              "inverse-primary": "#be0042",
              "tertiary-container": "#00e3fd",
              "on-error": "#490013",
              "outline": "#767579",
              "primary-fixed": "#ff7389",
              "outline-variant": "#48474b",
              "inverse-on-surface": "#555458",
              "surface-tint": "#ff8b9b",
              "error-container": "#a70138",
              "on-tertiary-fixed": "#003840",
              "secondary-fixed": "#d9caff",
              "on-tertiary-container": "#004d57",

            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(19, 19, 22, 0.7);
            backdrop-filter: blur(32px);
        }
        .neon-glow:focus-within {
            box-shadow: 0 0 15px rgba(129, 236, 255, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary/30">
<!-- Hero Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/80 to-transparent z-10"></div>
<img alt="Cinematic abstract" class="w-full h-full object-cover opacity-40" data-alt="Blurred cinematic background with bokeh neon lights in pink and purple hues reflecting on a dark rainy city street" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJLtoy2hSwR6wZ26Wg2CmPDzflaPpb4--LMZdM79TmjZPz8O88p0ckBfJR4qFeTdRPfCqRlmA9HVx7Fn-locog36oRIp6er2bB-_Sjw5k8SezNxFCSwpED0RsSwbRM3H4tp01M_ASiFH5DPm0Er_1j4WWk189xAvtJopchvkaERdhcGoUy_SquwCI48LVpoMRmazX6okfHIwDVuA2eXa1JTRlmQZWMdRo7kDgsaAX-mmQ702bifnOzpqy8caDqFhAeJt6tuRQZwDI"/>
</div>
<!-- Main Content Canvas -->
<main class="relative z-20 min-h-screen flex items-center justify-center p-6 lg:p-12">
<div class="w-full max-w-xl">
<!-- Logo Header -->
<div class="text-center mb-12">
<h1 class="font-headline text-4xl md:text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary mb-2">
                    NEON NOIR
                </h1>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-xs">The Digital Premiere Awaits</p>
</div>
<!-- Auth Card -->
<div class="glass-panel p-8 md:p-12 rounded-xl shadow-2xl border border-outline-variant/10">
<header class="mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-2">Create Account</h2>
<p class="text-on-surface-variant font-body">Join the elite circle of cinematic curators.</p>
</header>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2 group">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant group-focus-within:text-tertiary transition-colors" for="name">Full Name</label>
<div class="relative neon-glow">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="person">person</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-tertiary/20 transition-all outline-none font-body" id="name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-2 group">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant group-focus-within:text-tertiary transition-colors" for="email">Email Address</label>
<div class="relative neon-glow">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-tertiary/20 transition-all outline-none font-body" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2 group">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant group-focus-within:text-tertiary transition-colors" for="password">Password</label>
<div class="relative neon-glow">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-tertiary/20 transition-all outline-none font-body" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-2 group">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant group-focus-within:text-tertiary transition-colors" for="confirm-password">Confirm</label>
<div class="relative neon-glow">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="shield_check">shield</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-tertiary/20 transition-all outline-none font-body" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<div class="pt-1">
<input class="w-4 h-4 rounded bg-surface-container-highest border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-relaxed" for="terms">
                            I agree to the <a class="text-secondary hover:text-tertiary transition-colors" href="#">Terms of Service</a> and <a class="text-secondary hover:text-tertiary transition-colors" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-5 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span class="uppercase tracking-widest text-sm">Sign Up</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-8 border-t border-outline-variant/20 text-center">
<p class="text-on-surface-variant font-body mb-6">Already have an account?</p>
<a class="inline-flex items-center gap-2 px-8 py-3 rounded-full bg-surface-container-high text-on-surface font-semibold hover:bg-surface-bright transition-colors border border-outline-variant/10" href="#">
<span class="material-symbols-outlined text-lg" data-icon="login">login</span>
<span>Sign In</span>
</a>
</div>
</div>
<!-- Social Proof / Footer -->
<div class="mt-12 flex justify-center gap-8 opacity-40">
<span class="material-symbols-outlined text-3xl" data-icon="movie">movie</span>
<span class="material-symbols-outlined text-3xl" data-icon="tv">tv</span>
<span class="material-symbols-outlined text-3xl" data-icon="theaters">theaters</span>
<span class="material-symbols-outlined text-3xl" data-icon="high_quality">high_quality</span>
</div>
</div>
</main>
<!-- Support Help FAB (Contextually relevant for onboarding) -->
<div class="fixed bottom-8 right-8 z-50">
<button class="w-14 h-14 bg-surface-container-highest text-tertiary rounded-full flex items-center justify-center shadow-2xl hover:bg-surface-bright transition-all group border border-tertiary/10">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform" data-icon="help">help</span>
</button>
</div>
</body></html>
